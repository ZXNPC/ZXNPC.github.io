<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩汉诺塔 · 纯色分拣（自由移动·高对比色）</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a36 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: #3e5a6f;
            background-image: radial-gradient(circle at 30% 20%, #527a94, #2d4050);
            border-radius: 48px;
            padding: 30px 30px 40px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 4px rgba(255,255,255,0.2);
            border: 1px solid #80b0cc;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #edf4fa;
            text-shadow: 2px 2px 0 #1f2e3a;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f9e084, #f4cba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .title p {
            margin: 4px 0 0;
            font-size: 0.95rem;
            opacity: 0.9;
            font-style: italic;
        }
        .control-panel {
            display: flex;
            gap: 12px;
            background: #263b48;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #70a5c0;
            box-shadow: inset 0 2px 5px #101c26;
        }
        .badge {
            background: #17242e;
            border-radius: 40px;
            padding: 8px 22px;
            color: #ffecbb;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid #dba959;
            box-shadow: 0 2px 0 #0f1a21;
        }
        .btn-group {
            display: flex;
            gap: 6px;
        }
        button {
            background: #e3b87c;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e2f3b;
            width: 46px;
            height: 46px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #926d3d, 0 6px 10px black;
            transition: all 0.06s ease;
            border: 1px solid #ffde9e;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #926d3d, 0 6px 10px black;
        }
        button.reset-btn {
            background: #b0c7d9;
            box-shadow: 0 5px 0 #6b7f91;
            width: auto;
            padding: 0 24px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        button:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6b7f91;
            pointer-events: none;
        }
        .canvas-wrapper {
            background: #253d49;
            border-radius: 60px;
            padding: 20px 20px 0 20px;
            border: 3px solid #6f8fa0;
            box-shadow: inset 0 0 0 2px #aecfdf, 0 18px 20px -8px black;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #2c4757;
            background-image: radial-gradient(circle at 30% 40%, #3b6175, #1f3847);
            border-radius: 40px 40px 20px 20px;
            box-shadow: inset 0 -5px 0 #15232b, 0 10px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            touch-action: manipulation;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            color: #deecf2;
            font-weight: 500;
            background: #1f3643c9;
            padding: 10px 24px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid #80afc7;
        }
        .status {
            background: #14212b;
            padding: 6px 20px;
            border-radius: 36px;
            font-size: 1.2rem;
            color: #fadf9e;
            box-shadow: inset 0 2px 3px #03090e;
        }
        .move-counter {
            background: #2b3d47;
            padding: 6px 22px;
            border-radius: 36px;
            font-weight: 700;
            font-size: 1.3rem;
            border: 1px solid #ddb165;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title">
            <h1>🌈 色彩汉诺塔</h1>
            <p>移动顶部珠子 · 集齐 N 根纯色柱子（高对比色 / 支持 N=10）</p>
        </div>
        <div class="control-panel">
            <div class="badge" id="nDisplay">N = 3</div>
            <div class="btn-group">
                <button id="decrementN" aria-label="减少柱子">−</button>
                <button id="incrementN" aria-label="增加柱子">+</button>
            </div>
            <button class="reset-btn" id="resetGame">⟲ 重置</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div class="footer">
        <div class="status" id="statusMessage">点击柱子选中 / 移动</div>
        <div class="move-counter" id="moveCounter">步数 0</div>
    </div>
</div>

<script>
    (function() {
        // ----- 配置参数 -----
        const MIN_N = 2;
        const MAX_N = 10;                       // 支持最多 11 根柱子 (N+1)
        // 高对比度10色方案 (色相均匀分布，饱和度/亮度高，确保清晰区分)
        const COLORS = [
            "",                                 // 索引0不用
            "#E41A1C",  // 1 红
            "#FF8C00",  // 2 橙
            "#F0E442",  // 3 黄
            "#4DAF4A",  // 4 绿
            "#377EB8",  // 5 青
            "#084594",  // 6 深蓝
            "#984EA3",  // 7 紫
            "#FF69B4",  // 8 粉
            "#A65628",  // 9 棕
            "#999999",  // 10 灰
        ];

        // ----- 全局变量 -----
        let n = 3;                               // 当前珠子颜色数 = 柱子高度 = 前n根满柱
        let pegs = [];                           // 每根柱子(数组) 存储从底到顶的颜色索引 (1~n)
        let selectedPegIndex = null;              // 当前选中的柱子下标
        let gameOver = false;
        let moveCount = 0;

        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nDisplay = document.getElementById('nDisplay');
        const statusDiv = document.getElementById('statusMessage');
        const moveSpan = document.getElementById('moveCounter');
        const resetBtn = document.getElementById('resetGame');
        const decBtn = document.getElementById('decrementN');
        const incBtn = document.getElementById('incrementN');

        // 常量：绘制参数（自适应间距用）
        const START_X = 60;                        // 左侧起始偏移（像素）
        const END_X = canvas.width - 60;           // 右侧结束偏移

        // ----- 辅助函数: 更新显示文字 -----
        function updateUI() {
            nDisplay.innerText = `N = ${n}`;
            moveSpan.innerText = `步数 ${moveCount}`;
            if (gameOver) {
                statusDiv.innerText = '✨ 胜利！所有颜色各就各位 ✨';
            } else {
                statusDiv.innerText = selectedPegIndex !== null ? `选中第 ${selectedPegIndex+1} 柱` : '点击柱子选中 / 移动';
            }
        }

        // ----- 初始化/重置 游戏 (根据当前n) -----
        function initGame() {
            pegs = [];
            // 前 n 根柱子: 每根从底向上为 颜色1,2,...,n
            for (let i = 0; i < n; i++) {
                const peg = [];
                for (let c = 1; c <= n; c++) {
                    peg.push(c);                  // 底部索引0 = 颜色1, 顶部 = 颜色n
                }
                pegs.push(peg);
            }
            // 第 n+1 根柱子 (索引n) 为空
            pegs.push([]);                         // 空柱子

            selectedPegIndex = null;
            gameOver = false;
            moveCount = 0;
            updateUI();
            drawCanvas();
        }

        // ----- 检查胜利条件: 有 n 根柱子长度 = n 且所有珠子同色 -----
        function checkVictory() {
            if (gameOver) return true;
            let pureCount = 0;
            for (let i = 0; i < pegs.length; i++) {
                const peg = pegs[i];
                if (peg.length === n && peg.length > 0) {
                    const firstColor = peg[0];
                    if (peg.every(color => color === firstColor)) {
                        pureCount++;
                    }
                }
            }
            // 需要恰好 n 根纯色柱 (由于总珠子 n*n, 必然剩一根空柱)
            if (pureCount === n) {
                gameOver = true;
                updateUI();
                drawCanvas();
                return true;
            }
            return false;
        }

        // ----- 移动逻辑: 从 src 到 dst, 合法返回 true -----
        function tryMove(src, dst) {
            if (src === dst) return false;
            if (gameOver) return false;

            const srcPeg = pegs[src];
            const dstPeg = pegs[dst];

            if (srcPeg.length === 0) return false;               // 源无珠子
            if (dstPeg.length >= n) return false;                // 目标已满

            // 自由移动：任何珠子都可以移动到未满的柱子
            const srcTop = srcPeg[srcPeg.length - 1];
            srcPeg.pop();
            dstPeg.push(srcTop);
            moveCount++;
            updateUI();
            drawCanvas();

            // 移动后检查胜利
            checkVictory();
            return true;
        }

        // ----- 绘制画布（动态计算柱子位置）-----
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const totalPegs = pegs.length;            // n+1
            const step = (END_X - START_X) / (totalPegs - 1);  // 根据柱子数量自动调整间距

            const pegWidth = 40;
            const ballRadius = 14;                     // 为了容纳更多柱子，稍微缩小珠子半径 (原16->14)
            const baseY = 340;                          // 柱子底部Y坐标
            const ballDiameter = ballRadius * 2;
            const pegHeight = n * ballDiameter;         // 柱子可视高度

            // 绘制所有柱子基底 (木台)
            ctx.fillStyle = '#8b6e4b';
            ctx.shadowColor = '#1e2c33';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            ctx.beginPath();
            ctx.rect(30, baseY + 6, canvas.width - 60, 16);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 绘制每根柱子
            for (let i = 0; i < totalPegs; i++) {
                const x = START_X + i * step;
                const peg = pegs[i];

                // 柱子阴影
                ctx.shadowColor = '#10222b';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // 柱子本身 (半透明木质)
                ctx.fillStyle = '#ae8f6b';
                ctx.strokeStyle = '#5d4632';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(x - pegWidth/2, baseY - pegHeight, pegWidth, pegHeight, 12);
                ctx.fill();
                ctx.stroke();

                // 柱子内衬高光
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = '#dbbc8b';
                ctx.beginPath();
                ctx.roundRect(x - pegWidth/3, baseY - pegHeight + 2, pegWidth/2.5, pegHeight-4, 8);
                ctx.fill();

                // 重置阴影 (画珠子要用清晰阴影)
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 2;
                ctx.shadowColor = '#0a1a21';

                // 绘制珠子 (从下往上)
                for (let j = 0; j < peg.length; j++) {
                    const colorIndex = peg[j];
                    const color = COLORS[colorIndex] || '#aaa';
                    const yPos = baseY - ballRadius - j * ballDiameter; // 底部j=0在最下

                    // 珠子渐变
                    const gradient = ctx.createRadialGradient(x-4, yPos-4, 4, x, yPos, ballRadius+4);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(0.8, '#2c2c2c');
                    gradient.addColorStop(1, '#111');
                    ctx.beginPath();
                    ctx.arc(x, yPos, ballRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    // 高光
                    ctx.shadowBlur = 4;
                    ctx.shadowOffsetX = -1;
                    ctx.shadowOffsetY = -1;
                    ctx.shadowColor = '#f5f9ff';
                    ctx.beginPath();
                    ctx.arc(x-4, yPos-4, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffff60';
                    ctx.fill();

                    // 边缘描边
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#00000060';
                    ctx.shadowOffsetX = 1;
                    ctx.shadowOffsetY = 1;
                    ctx.strokeStyle = '#1f2e38';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(x, yPos, ballRadius, 0, 2 * Math.PI);
                    ctx.stroke();
                }

                // 柱子编号
                ctx.shadowBlur = 0;
                ctx.font = 'bold 16px "Segoe UI"';
                ctx.fillStyle = '#f0e5d2';
                ctx.shadowColor = '#1e3a47';
                ctx.shadowOffsetY = 2;
                ctx.fillText(i+1, x-10, baseY + 28);
            }

            // 绘制选中高亮 (金色边框)
            if (selectedPegIndex !== null && !gameOver) {
                const x = START_X + selectedPegIndex * step;
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#ffcf8a';
                ctx.strokeStyle = '#f5c542';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.roundRect(x - pegWidth/2 - 4, baseY - pegHeight - 4, pegWidth + 8, pegHeight + 12, 16);
                ctx.stroke();
            }

            // 如果游戏结束，显示透明蒙层和胜利徽章
            if (gameOver) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#d4f0d0a0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 42px "Segoe UI", cursive';
                ctx.fillStyle = '#266b3e';
                ctx.shadowColor = '#a0d8b0';
                ctx.shadowBlur = 16;
                ctx.fillText('🏆', 320, 200);
            }

            // 重置阴影
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // 工具: canvas 圆角矩形
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // ----- 点击画布处理（动态计算柱子位置）-----
        function handleCanvasClick(e) {
            if (gameOver) {
                statusDiv.innerText = '游戏已胜利，点击重置继续';
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // canvas 物理像素比例
            const mouseCanvasX = (e.clientX - rect.left) * scaleX;

            // 根据当前柱子数量动态计算步长和位置
            const totalPegs = pegs.length;
            const step = (END_X - START_X) / (totalPegs - 1);
            // 感应半宽：取 step 的 0.35 倍，约等于柱子半宽+余量
            const hitHalfWidth = step * 0.35;

            let clickedIndex = -1;
            for (let i = 0; i < totalPegs; i++) {
                const pegX = START_X + i * step;
                if (mouseCanvasX >= pegX - hitHalfWidth && mouseCanvasX <= pegX + hitHalfWidth) {
                    clickedIndex = i;
                    break;
                }
            }

            // 点击空白区域
            if (clickedIndex === -1) {
                if (selectedPegIndex !== null) {
                    selectedPegIndex = null;
                    updateUI();
                    drawCanvas();
                }
                return;
            }

            // 1. 没有选中任何柱子
            if (selectedPegIndex === null) {
                // 点击的柱子必须非空才能选中
                if (pegs[clickedIndex].length > 0) {
                    selectedPegIndex = clickedIndex;
                } else {
                    // 点击空柱子无反应，但取消之前的选中(已经是null)
                }
                updateUI();
                drawCanvas();
                return;
            }

            // 2. 已经选中了一个柱子
            if (selectedPegIndex !== null) {
                // 如果点击同一个柱子 -> 取消选中
                if (clickedIndex === selectedPegIndex) {
                    selectedPegIndex = null;
                    updateUI();
                    drawCanvas();
                    return;
                }

                // 尝试移动
                const success = tryMove(selectedPegIndex, clickedIndex);
                if (success) {
                    selectedPegIndex = null;  // 移动成功后清除选中
                } else {
                    // 移动失败：显示提示并取消选中
                    statusDiv.innerText = '🚫 不合规移动 (源无珠子/目标已满)';
                    selectedPegIndex = null;
                    drawCanvas();
                    updateUI(); // 更新状态文字
                }
            }
        }

        // ----- 改变 N 并重置 -----
        function changeN(delta) {
            let newN = n + delta;
            if (newN < MIN_N) newN = MIN_N;
            if (newN > MAX_N) newN = MAX_N;
            if (newN === n) return;
            n = newN;
            initGame();       // 重置所有
        }

        // ----- 事件绑定 -----
        canvas.addEventListener('click', handleCanvasClick);

        resetBtn.addEventListener('click', () => {
            initGame();
        });

        decBtn.addEventListener('click', () => {
            changeN(-1);
        });

        incBtn.addEventListener('click', () => {
            changeN(1);
        });

        // 启动游戏
        initGame();

    })();
</script>
</body>
</html>
