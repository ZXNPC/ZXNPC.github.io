<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色彩汉诺塔 · 移动优化版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a36 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 8px;
        }
        .game-container {
            background: #3e5a6f;
            background-image: radial-gradient(circle at 30% 20%, #527a94, #2d4050);
            border-radius: 36px;
            padding: 16px 16px 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 4px rgba(255,255,255,0.2);
            border: 1px solid #80b0cc;
            width: 100%;
            max-width: 700px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #edf4fa;
            text-shadow: 2px 2px 0 #1f2e3a;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f9e084, #f4cba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            line-height: 1.2;
        }
        .title p {
            margin: 2px 0 0;
            font-size: 0.8rem;
            opacity: 0.9;
            font-style: italic;
        }
        .control-panel {
            display: flex;
            gap: 8px;
            background: #263b48;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #70a5c0;
            box-shadow: inset 0 2px 5px #101c26;
            flex-wrap: wrap;
            justify-content: center;
        }
        .badge {
            background: #17242e;
            border-radius: 30px;
            padding: 6px 16px;
            color: #ffecbb;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #dba959;
            box-shadow: 0 2px 0 #0f1a21;
            min-width: 70px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 4px;
        }
        button {
            background: #e3b87c;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e2f3b;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #926d3d, 0 6px 8px black;
            transition: all 0.06s ease;
            border: 1px solid #ffde9e;
            touch-action: manipulation;
            padding: 0;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #926d3d, 0 6px 8px black;
        }
        button.reset-btn {
            background: #b0c7d9;
            box-shadow: 0 4px 0 #6b7f91;
            width: auto;
            padding: 0 18px;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
        .canvas-wrapper {
            background: #253d49;
            border-radius: 40px;
            padding: 12px 12px 0;
            border: 3px solid #6f8fa0;
            box-shadow: inset 0 0 0 2px #aecfdf, 0 18px 20px -8px black;
            margin: 8px 0 4px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #2c4757;
            background-image: radial-gradient(circle at 30% 40%, #3b6175, #1f3847);
            border-radius: 30px 30px 16px 16px;
            box-shadow: inset 0 -5px 0 #15232b, 0 10px 10px rgba(0,0,0,0.4);
            cursor: grab;
            touch-action: none; /* 禁止触摸滚动/缩放 */
        }
        canvas.dragging {
            cursor: grabbing;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            color: #deecf2;
            font-weight: 500;
            background: #1f3643c9;
            padding: 8px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid #80afc7;
            font-size: 0.9rem;
        }
        .status {
            background: #14212b;
            padding: 4px 16px;
            border-radius: 30px;
            color: #fadf9e;
            box-shadow: inset 0 2px 3px #03090e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }
        .move-counter {
            background: #2b3d47;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 700;
            border: 1px solid #ddb165;
            white-space: nowrap;
        }

        /* 针对小屏幕的进一步优化 */
        @media (max-width: 500px) {
            .game-container {
                padding: 12px 12px 18px;
            }
            .title h1 {
                font-size: 1.5rem;
            }
            .title p {
                font-size: 0.7rem;
            }
            .control-panel {
                padding: 6px 12px;
                gap: 6px;
            }
            .badge {
                padding: 4px 12px;
                font-size: 1rem;
                min-width: 60px;
            }
            button {
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
            }
            button.reset-btn {
                padding: 0 14px;
                font-size: 0.9rem;
            }
            .footer {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }

        @media (max-width: 380px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .control-panel {
                justify-content: space-between;
            }
            .title {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title">
            <h1>🌈 色彩汉诺塔</h1>
            <p>拖拽珠子 · 集齐 N 根纯色柱子（触摸优化）</p>
        </div>
        <div class="control-panel">
            <div class="badge" id="nDisplay">N = 3</div>
            <div class="btn-group">
                <button id="decrementN" aria-label="减少柱子">−</button>
                <button id="incrementN" aria-label="增加柱子">+</button>
            </div>
            <button class="reset-btn" id="resetGame">重</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <div class="footer">
        <div class="status" id="statusMessage">拖拽珠子进行移动</div>
        <div class="move-counter" id="moveCounter">步数 0</div>
    </div>
</div>

<script>
    (function() {
        // ----- 配置参数 -----
        const MIN_N = 2;
        const MAX_N = 10;
        const COLORS = [
            "",
            "#E41A1C",  // 1 红
            "#FF8C00",  // 2 橙
            "#F0E442",  // 3 黄
            "#4DAF4A",  // 4 绿
            "#377EB8",  // 5 青
            "#084594",  // 6 深蓝
            "#984EA3",  // 7 紫
            "#FF69B4",  // 8 粉
            "#A65628",  // 9 棕
            "#999999",  // 10 灰
        ];

        // ----- 全局变量 -----
        let n = 3;
        let pegs = [];
        let gameOver = false;
        let moveCount = 0;

        // 拖拽状态
        let dragState = {
            active: false,
            srcPeg: -1,
            color: 0,
            mouseX: 0,
            mouseY: 0,
        };

        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nDisplay = document.getElementById('nDisplay');
        const statusDiv = document.getElementById('statusMessage');
        const moveSpan = document.getElementById('moveCounter');
        const resetBtn = document.getElementById('resetGame');
        const decBtn = document.getElementById('decrementN');
        const incBtn = document.getElementById('incrementN');

        // 绘制参数（根据画布尺寸调整）
        const START_X = 70;                        // 左右边距稍大，适应更多柱子
        const END_X = canvas.width - 70;
        const BASE_Y = 420;                        // 柱子底部Y坐标（抬高以适应更大珠子）
        const PEG_WIDTH = 48;                       // 柱子宽度
        const BALL_RADIUS = 20;                      // 珠子半径（明显增大）
        const BALL_DIAMETER = BALL_RADIUS * 2;

        // ----- 辅助函数: 更新显示文字 -----
        function updateUI() {
            nDisplay.innerText = `N = ${n}`;
            moveSpan.innerText = `步数 ${moveCount}`;
            if (gameOver) {
                statusDiv.innerText = '✨ 胜利！所有颜色各就各位 ✨';
            } else {
                statusDiv.innerText = dragState.active ? '拖动中...' : '拖拽珠子进行移动';
            }
        }

        // ----- 初始化/重置游戏 -----
        function initGame() {
            pegs = [];
            for (let i = 0; i < n; i++) {
                const peg = [];
                for (let c = 1; c <= n; c++) {
                    peg.push(c);
                }
                pegs.push(peg);
            }
            pegs.push([]); // 空柱子

            dragState.active = false;
            gameOver = false;
            moveCount = 0;
            updateUI();
            drawCanvas();
        }

        // ----- 检查胜利条件 -----
        function checkVictory() {
            if (gameOver) return true;
            let pureCount = 0;
            for (let i = 0; i < pegs.length; i++) {
                const peg = pegs[i];
                if (peg.length === n && peg.length > 0) {
                    const firstColor = peg[0];
                    if (peg.every(color => color === firstColor)) {
                        pureCount++;
                    }
                }
            }
            if (pureCount === n) {
                gameOver = true;
                dragState.active = false;
                updateUI();
                drawCanvas();
                return true;
            }
            return false;
        }

        // ----- 绘制画布 -----
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const totalPegs = pegs.length;
            const step = (END_X - START_X) / (totalPegs - 1);
            const pegHeight = n * BALL_DIAMETER;

            // 基底
            ctx.fillStyle = '#8b6e4b';
            ctx.shadowColor = '#1e2c33';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            ctx.beginPath();
            ctx.rect(30, BASE_Y + 8, canvas.width - 60, 20);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // 绘制每根柱子
            for (let i = 0; i < totalPegs; i++) {
                const x = START_X + i * step;
                const peg = pegs[i];

                // 柱子阴影
                ctx.shadowColor = '#10222b';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // 柱子本身
                ctx.fillStyle = '#ae8f6b';
                ctx.strokeStyle = '#5d4632';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(x - PEG_WIDTH/2, BASE_Y - pegHeight, PEG_WIDTH, pegHeight, 16);
                ctx.fill();
                ctx.stroke();

                // 内衬高光
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = '#dbbc8b';
                ctx.beginPath();
                ctx.roundRect(x - PEG_WIDTH/3, BASE_Y - pegHeight + 2, PEG_WIDTH/2.5, pegHeight-4, 12);
                ctx.fill();

                // 重置阴影（画珠子）
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 2;
                ctx.shadowColor = '#0a1a21';

                // 绘制珠子
                for (let j = 0; j < peg.length; j++) {
                    const colorIndex = peg[j];
                    const color = COLORS[colorIndex] || '#aaa';
                    const yPos = BASE_Y - BALL_RADIUS - j * BALL_DIAMETER;

                    const gradient = ctx.createRadialGradient(x-5, yPos-5, 5, x, yPos, BALL_RADIUS+5);
                    gradient.addColorStop(0, color);
                    gradient.addColorStop(0.8, '#2c2c2c');
                    gradient.addColorStop(1, '#111');
                    ctx.beginPath();
                    ctx.arc(x, yPos, BALL_RADIUS, 0, 2 * Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.shadowBlur = 5;
                    ctx.shadowOffsetX = -2;
                    ctx.shadowOffsetY = -2;
                    ctx.shadowColor = '#f5f9ff';
                    ctx.beginPath();
                    ctx.arc(x-5, yPos-5, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffff60';
                    ctx.fill();

                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00000080';
                    ctx.shadowOffsetX = 1;
                    ctx.shadowOffsetY = 1;
                    ctx.strokeStyle = '#1f2e38';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, yPos, BALL_RADIUS, 0, 2 * Math.PI);
                    ctx.stroke();
                }

                // 柱子编号（加大字号）
                ctx.shadowBlur = 0;
                ctx.font = 'bold 18px "Segoe UI"';
                ctx.fillStyle = '#f0e5d2';
                ctx.shadowColor = '#1e3a47';
                ctx.shadowOffsetY = 2;
                ctx.fillText(i+1, x-12, BASE_Y + 32);
            }

            // 如果正在拖拽，绘制跟随珠子
            if (dragState.active) {
                const x = dragState.mouseX;
                const y = dragState.mouseY;
                const color = COLORS[dragState.color] || '#aaa';

                ctx.shadowBlur = 16;
                ctx.shadowColor = '#ffffff';
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.beginPath();
                ctx.arc(x, y, BALL_RADIUS, 0, 2 * Math.PI);
                ctx.fillStyle = color + 'CC';
                ctx.fill();

                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f5f9ff';
                ctx.beginPath();
                ctx.arc(x-4, y-4, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff80';
                ctx.fill();

                ctx.shadowBlur = 12;
                ctx.shadowColor = '#00000080';
                ctx.strokeStyle = '#1f2e38';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(x, y, BALL_RADIUS, 0, 2 * Math.PI);
                ctx.stroke();
            }

            // 胜利蒙层
            if (gameOver) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#d4f0d0a0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 52px "Segoe UI", cursive';
                ctx.fillStyle = '#266b3e';
                ctx.shadowColor = '#a0d8b0';
                ctx.shadowBlur = 16;
                ctx.fillText('🏆', 330, 280);
            }

            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // 工具函数：圆角矩形
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // 获取鼠标/触摸在canvas上的坐标
        function getCanvasMouseFromClient(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (clientX - rect.left) * scaleX;
            const mouseY = (clientY - rect.top) * scaleY;
            return { x: mouseX, y: mouseY };
        }

        // 根据鼠标X获取柱子索引（扩大感应区为 step*0.5）
        function getPegIndexFromX(mouseX) {
            const totalPegs = pegs.length;
            const step = (END_X - START_X) / (totalPegs - 1);
            const hitHalfWidth = step * 0.5; // 增大感应区
            for (let i = 0; i < totalPegs; i++) {
                const pegX = START_X + i * step;
                if (mouseX >= pegX - hitHalfWidth && mouseX <= pegX + hitHalfWidth) {
                    return i;
                }
            }
            return -1;
        }

        // ----- 核心拖拽逻辑 -----
        function handleDragStart(pegIndex, x, y) {
            if (gameOver || dragState.active) return false;

            const srcPeg = pegs[pegIndex];
            if (srcPeg.length === 0) return false;

            const topColor = srcPeg.pop();
            dragState.active = true;
            dragState.srcPeg = pegIndex;
            dragState.color = topColor;
            dragState.mouseX = x;
            dragState.mouseY = y;

            canvas.classList.add('dragging');
            updateUI();
            drawCanvas();
            return true;
        }

        function handleDragMove(x, y) {
            if (!dragState.active) return;
            dragState.mouseX = x;
            dragState.mouseY = y;
            drawCanvas();
        }

        function handleDragEnd(x, y) {
            if (!dragState.active) return;

            const targetPegIndex = getPegIndexFromX(x);

            let moveSuccess = false;
            if (targetPegIndex !== -1 && targetPegIndex !== dragState.srcPeg) {
                if (pegs[targetPegIndex].length < n) {
                    pegs[targetPegIndex].push(dragState.color);
                    moveCount++;
                    moveSuccess = true;
                    updateUI();
                    checkVictory();
                }
            }

            if (!moveSuccess) {
                pegs[dragState.srcPeg].push(dragState.color);
            }

            dragState.active = false;
            canvas.classList.remove('dragging');
            updateUI();
            drawCanvas();
        }

        // ----- 鼠标事件 -----
        function onMouseDown(e) {
            e.preventDefault();
            const { x, y } = getCanvasMouseFromClient(e.clientX, e.clientY);
            const pegIndex = getPegIndexFromX(x);
            if (pegIndex !== -1) {
                handleDragStart(pegIndex, x, y);
            }
        }

        function onMouseMove(e) {
            if (!dragState.active) return;
            e.preventDefault();
            const { x, y } = getCanvasMouseFromClient(e.clientX, e.clientY);
            handleDragMove(x, y);
        }

        function onMouseUp(e) {
            if (!dragState.active) return;
            e.preventDefault();
            const { x, y } = getCanvasMouseFromClient(e.clientX, e.clientY);
            handleDragEnd(x, y);
        }

        // ----- 触摸事件 -----
        function onTouchStart(e) {
            e.preventDefault();
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                const { x, y } = getCanvasMouseFromClient(touch.clientX, touch.clientY);
                const pegIndex = getPegIndexFromX(x);
                if (pegIndex !== -1) {
                    handleDragStart(pegIndex, x, y);
                }
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            if (!dragState.active) return;
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                const { x, y } = getCanvasMouseFromClient(touch.clientX, touch.clientY);
                handleDragMove(x, y);
            }
        }

        function onTouchEnd(e) {
            e.preventDefault();
            if (!dragState.active) return;
            if (e.changedTouches.length > 0) {
                const touch = e.changedTouches[0];
                const { x, y } = getCanvasMouseFromClient(touch.clientX, touch.clientY);
                handleDragEnd(x, y);
            } else {
                pegs[dragState.srcPeg].push(dragState.color);
                dragState.active = false;
                canvas.classList.remove('dragging');
                updateUI();
                drawCanvas();
            }
        }

        function onTouchCancel(e) {
            e.preventDefault();
            if (dragState.active) {
                pegs[dragState.srcPeg].push(dragState.color);
                dragState.active = false;
                canvas.classList.remove('dragging');
                updateUI();
                drawCanvas();
            }
        }

        // ----- 改变N并重置 -----
        function changeN(delta) {
            let newN = n + delta;
            if (newN < MIN_N) newN = MIN_N;
            if (newN > MAX_N) newN = MAX_N;
            if (newN === n) return;
            n = newN;
            initGame();
        }

        // 事件绑定
        canvas.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);

        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchend', onTouchEnd, { passive: false });
        canvas.addEventListener('touchcancel', onTouchCancel, { passive: false });

        canvas.addEventListener('dragstart', (e) => e.preventDefault());

        resetBtn.addEventListener('click', initGame);
        decBtn.addEventListener('click', () => changeN(-1));
        incBtn.addEventListener('click', () => changeN(1));

        // 启动游戏
        initGame();
    })();
</script>
</body>
</html>
